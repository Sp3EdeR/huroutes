# This action runs static code analysis checks on the huroutes source code

name: huroutes static tests
on:
  push:
    branches:
      - master
  pull_request:           # PRs to any branch
  workflow_dispatch:      # Manual execution
  schedule:
    - cron: '35 10 * * 3' # Every once in a while (for CodeQL security checks mainly)
jobs:
  test-db:
    # Validates the huroutes route database
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run the check
        run: |
          python -m venv "$RUNNER_TEMP/huroutes-test-venv"
          "$RUNNER_TEMP/huroutes-test-venv/bin/python" -m pip install --disable-pip-version-check jsonschema
          "$RUNNER_TEMP/huroutes-test-venv/bin/python" ".github/scripts/validate-database.py" data.json data.schema.json
  codeql:
    # Runs CodeQL checks on javascript source code
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
